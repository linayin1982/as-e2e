tags:
  - name: xCall uplink responses
    description: |
      `[PRODUCTION]` xCall uplink responses.
  - name: xCall uplink events
    description: |
      `[PRODUCTION]` xCall uplink events.
  - name: xCall service ids
    description: |
      `[PRODUCTION]` xCall service ids.

paths:
  /services:
    post:
      summary: Vehicle send Information Call (iCall) and Breakdown call(bCall) start event.
      description: >
        Returns generated serviceId for service in response.
        
          ---
          _Required Action: `Write_bCall` or `Write_iCall`_
      operationId: sendStartEvent
      tags:
        - xCall uplink events
      parameters:
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/header/TraceParent'
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/header/TraceState'
      requestBody:
        description: xCall start event. To handle start events from the Vehicle, for Information Call (iCall) and Breakdown call(bCall).
        content:
          'application/json':
            schema:
              $ref: '../target/generated-sources/schemas/xcall.yml#/components/schemas/EnablingStartEvent'
        required: true
      responses:
        '201':
          $ref: '#/components/responses/EnablingStartResponse'
        '401':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response401'
        '403':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response403'
        '500':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response500'

  /services/{serviceId}:
    put:
      summary: Vehicle send update and terminate event for Information Call (iCall) and Breakdown call(bCall).
      description: >
          _Required Action: `Write_bCall` or `Write_iCall`_
      operationId: sendUpdateEvents
      tags:
        - xCall uplink events
      parameters:
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/path/ServiceId'
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/header/TraceParent'
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/header/TraceState'
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/query/ServiceIdentifierType'
      requestBody:
        description: xCall update event. To handle different update events from the Vehicle, such as update and termination events for Information Call (iCall) and Breakdown call(bCall). In order to treat the update event as start event, then the serviceInternalInformation with valid vehicleRegistrationCountry must be sent if this is used for routing.
        content:
          'application/json':
            schema:
              $ref: '../target/generated-sources/schemas/xcall.yml#/components/schemas/EnablingEvent'
        required: true
      responses:
        '200':
          $ref: '#/components/responses/EnablingResponse'
        '401':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response401'
        '403':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response403'
        '404':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response404'
        '500':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response500'

  /services/{serviceId}/acknowledgements:
    put:
      summary: Send acknowledgement message for Information Call (iCall) and Breakdown call(bCall) request sent from call center client.
      description: >
        _Required Action: `Write_bCall` or `Write_iCall`_
      operationId: sendResponse
      tags:
        - xCall uplink responses
      parameters:
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/path/ServiceId'
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/header/TraceParent'
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/header/TraceState'
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/query/ServiceIdentifierType'
      requestBody:
        description: xCall acknowledgement event for stop and update requests for Information Call (iCall) and Breakdown call(bCall).
        content:
          'application/json':
            schema:
              $ref: '../target/generated-sources/schemas/xcall.yml#/components/schemas/EnablingAckReqBody'
      responses:
        '200':
          $ref: '#/components/responses/EnablingResponse'
        '401':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response401'
        '403':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response403'
        '404':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response404'
        '500':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response500'

  /vehicles/{vehicleId}/services:
    get:
      summary: Get all active services for a vehicleId for manual Information Call (iCall) and Breakdown call(bCall) services.
      description: >
        _Required Action: `Read_bCall`, `Read_iCall`, `Write_bCall` or `Write_iCall`_
      tags:
        - xCall service ids
      operationId: getServices
      parameters:
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/path/VehicleId'
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/header/TraceParent'
        - $ref: '../target/generated-sources/schemas/common.yml#/parameters/header/TraceState'
      responses:
        '200':
          $ref: '#/components/responses/GetServiceResponse'
        '401':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response401'
        '403':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response403'
        '404':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response404'
        '500':
          $ref: '../target/generated-sources/schemas/xcall.yml#/components/responses/Response500'

components:
  securitySchemes:
    AccessManagementAuthorizer:
      type: http
      scheme: bearer
      bearerFormat: JWT

    sigv4:
      type: apiKey
      name: authorization
      in: header
      x-amazon-apigateway-authtype: awsSigv4

  schemas:
    EnablingResponse:
      type: object
      properties:
        statusType:
          $ref: '../target/generated-sources/schemas/common.yml#/components/schemas/StatusType'
    EnablingStartResponse:
      type: object
      properties:
        serviceId:
          $ref: '../target/generated-sources/schemas/common.yml#/components/schemas/ServiceId'
        statusType:
          $ref: '../target/generated-sources/schemas/common.yml#/components/schemas/StatusType'
    GetServiceResponse:
      type: array
      items:
        $ref: '#/components/schemas/GetServicesResponseItem'
    GetServicesResponseItem:
      type: object
      properties:
        serviceId:
          $ref: '../target/generated-sources/schemas/common.yml#/components/schemas/ServiceId'
        statusType:
          $ref: '../target/generated-sources/schemas/common.yml#/components/schemas/StatusType'
        serviceType:
          type: string
          description: Describes which type of service is returned
          enum:
            - ICALL
            - BCALL
        startTime:
          $ref: '../target/generated-sources/schemas/common.yml#/components/schemas/Time'

  responses:
    EnablingResponse:
      description: Return the status type
      content:
        'application/json':
          schema:
            $ref: '#/components/schemas/EnablingResponse'
    EnablingStartResponse:
      description: Return serviceId and status type
      content:
        'application/json':
          schema:
            $ref: '#/components/schemas/EnablingStartResponse'
    GetServiceResponse:
      description: Return active serviceIds
      content:
        'application/json':
          schema:
            $ref: '#/components/schemas/GetServiceResponse'

security:
  - AccessManagementAuthorizer:
      [ ]
